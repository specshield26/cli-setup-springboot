# .specshield.yml — generated by `specshield init`
#
# Picked up automatically by every `specshield` invocation in this directory.
# CLI flags always override values in this file.
# Safe to commit. Never put your API key here — keep it in ~/.specshield/config.json
# or set SPECSHIELD_API_KEY in CI.

schemaVersion: 1

# Local compare defaults — used by `specshield compare`.
failOnBreaking: true
severity: error

# BDCT defaults — used by every `specshield bdct ...` command.
bdct:
  org: testorg
  environment: production

  # This project publishes a provider spec.
  provider:
    name: springboot-test-project
    spec: openapi.yaml
    branch: main

# GitHub App + bdct-action defaults.
github:
  specPath: openapi.yaml
  failOnBreaking: true
  commentOnPr: true
