openapi: 3.0.3
info:
  title: Users API
  description: |
    Minimal "users" CRUD API used as a SpecShield test fixture.
    This is the **v1** (baseline) spec. Identical to the Node test
    project's openapi.yaml — by design — so test scenario P9.1
    (multi-language consistency) can verify the diff output is
    byte-identical across project types.
  version: 1.0.0
  contact:
    name: SpecShield Test Fixture
    email: test@specshield.io

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: users
    description: User account operations

paths:
  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List all users
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                required: [data, total]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
                    description: Total number of users matching the query

    post:
      tags: [users]
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                email:
                  type: string
                  format: email
                  description: Optional in v1; required in v2 (breaking change).
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [users]
      operationId: getUser
      summary: Get a single user
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

    patch:
      tags: [users]
      operationId: updateUser
      summary: Update a user's mutable fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [users]
      operationId: deleteUser
      summary: Delete a user
      description: |
        Removed entirely in v2 — this is a breaking change. Any consumer
        still calling DELETE /users/{id} will get a 404 against the v2 API.
      responses:
        '204':
          description: User deleted

components:
  schemas:
    User:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        legacy_id:
          type: integer
          description: |
            Pre-UUID numeric ID for compatibility with the old system.
            Removed in v2 — clients that read this field will break.
        created_at:
          type: string
          format: date-time
